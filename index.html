<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="scripts/index.js" type="module"></script>
    <link rel="stylesheet" href="styles/index.css" />
  </head>
  <body>
    <section class="wrapper">
      <div class="container">
        <div
          class="slider"
          id="slider"
          data-slides-to-show="4"
          data-slides-to-scroll="1"
          data-start-slide="1"
          data-autoscroll-delay="3"
          data-animation-scroll="smooth"
        >
          <div class="slider__body">
            <div class="slider__container" id="slider-container">
              <ul
                class="slider__indicator indicator"
                id="indicators-list"
                data-indicator-align="none"
              ></ul>
              <ul class="slider__list" id="slider-list">
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
                <li class="slider__item">
                  <div class="item"></div>
                </li>
              </ul>
              <div class="slider__actions" data-controll-button-align="outside">
                <div
                  class="slider__action slider__prev element-hidden"
                  id="prev"
                ></div>
                <div class="slider__action slider__next" id="next"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
